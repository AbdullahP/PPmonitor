<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pokémon Monitor — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111319;
      color: #e2e2eb;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .login-card {
      background: #1e1f26;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .logo {
      text-align: center;
      margin-bottom: 8px;
      font-size: 2rem;
    }
    h1 {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: #fff;
    }
    h1 span { color: #adc6ff; }
    .subtitle {
      text-align: center;
      color: #8c909f;
      font-size: 0.85rem;
      margin-bottom: 36px;
    }
    label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #8c909f;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      background: #191b22;
      border: none;
      color: #e2e2eb;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      margin-bottom: 20px;
      transition: box-shadow 0.15s;
    }
    input:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(173, 198, 255, 0.3);
    }
    button {
      width: 100%;
      background: linear-gradient(to bottom right, #adc6ff, #4d8eff);
      color: #002e6a;
      border: none;
      padding: 13px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    .error {
      background: rgba(255, 180, 171, 0.12);
      border: 1px solid rgba(255, 180, 171, 0.3);
      color: #ffb4ab;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">&#9889;</div>
    <h1>Pokémon <span>Monitor</span></h1>
    <p class="subtitle">Stock monitoring dashboard</p>
    {{ error_block|safe }}
    <form method="POST" action="/login">
      <label>Username</label>
      <input type="text" name="username" autofocus autocomplete="username">
      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password">
      <button type="submit">Sign in &rarr;</button>
    </form>
  </div>
</body>
</html>
